services:
  frontend:
    build:
      context: ./sleepie-landing-page
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_API_URL: ${VITE_API_URL:-https://api.sleepieherbal.com}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network
      - coolify

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=SleepieDB;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-https://api.sleepieherbal.com}
      Jwt__Audience: ${JWT_AUDIENCE:-https://sleepieherbal.com}
      Google__ClientId: ${VITE_GOOGLE_CLIENT_ID}
      GeminiApiKey: ${GEMINI_API_KEY}
      Cors__Origins: ${CORS_ORIGINS:-https://sleepieherbal.com,http://localhost:5173}
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
      - coolify

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
    volumes:
      - sqldata:/var/lib/mssql/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -b -C"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
  coolify:
    external: true

volumes:
  sqldata:
